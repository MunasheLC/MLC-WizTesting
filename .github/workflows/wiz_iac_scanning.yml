name: "wiz-cli"

on:
  pull_request:

jobs:
  wiz-cli-redis-image-scan:
    name: "Wiz-cli Redis Image Scan (SARIF)"
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: read
      security-events: write

    env:
      IMAGE: "redis:3.2.12-stretch"   # Intentionally old -> should show CVEs
      POLICY: "Default vulnerabilities policy"
      SARIF_FILE: "wiz-results.sarif"

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull Redis image
        run: docker pull "${IMAGE}"

      - name: Download Wiz CLI
        run: |
          curl -L -o wizcli https://downloads.wiz.io/v1/wizcli/latest/wizcli-linux-amd64
          chmod +x wizcli

      - name: Scan Redis image (output SARIF)
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
        run: |
          ./wizcli scan container-image "${IMAGE}" \
            --policies "${POLICY}" \
            --output "${SARIF_FILE}",sarif

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ env.SARIF_FILE }}